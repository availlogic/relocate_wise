name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel a previous run on the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    # The Postgres integration test uses testcontainers to spin up a
    # throwaway postgis:16-3.4-alpine container. The GH-hosted runner
    # has Docker, so the suite runs end-to-end here.
    services:
      # We could pre-start a `postgres` service for the API tests,
      # but the testcontainers path is the more faithful one (PostGIS
      # extension, the same image as production). Leaving this empty.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        # In CI we expose the docker socket to testcontainers via the
        # default /var/run/docker.sock mount.
        run: npm test

      - name: Build (shared + api + web)
        run: npm run build

      - name: Docker smoke build
        # The 3 api service images share a build context (the repo
        # root). Each Dockerfile copies `db/`, `shared/`, and its own
        # workspace from the root. We smoke-build all three so a
        # Dockerfile regression in any of the api services fails CI.
        run: |
          docker build -f api/matching-service/Dockerfile -t relocatewise-matching:ci-smoke .
          docker build -f api/ingestion-service/Dockerfile -t relocatewise-ingestion:ci-smoke .
          docker build -f api/gateway/Dockerfile -t relocatewise-gateway:ci-smoke .

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - uses: setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build web bundle
        run: npm -w @relocatewise/web-container run build

      - name: Run Playwright E2E
        run: cd web && npx playwright test
        env:
          CI: 'true'
