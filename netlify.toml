# Netlify build & deploy for the RelocateWise SPA + edge proxy.
#
# Frontend (this file's `[build]` block): the React/Vite SPA ships
# from `web/`. The matching API runs on the CEO's Ubuntu server
# (Caddy + Fastify), fronted by a single Netlify Function defined in
# `netlify/functions/proxy.ts`.
#
# Required environment variables (set in the Netlify UI, never in
# source):
#   API_ORIGIN   — e.g. https://api.example.com (no trailing slash)
#   API_SECRET   — shared secret sent in `x-relocatewise-secret`

[build]
  base = "web"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Functions are auto-discovered under netlify/functions/. The default
# bundle is ESM-compatible; the function uses `fetch` which is provided
# by the Netlify Edge runtime.

# SPA routing — all unknown paths fall back to index.html so the
# React Router can take over.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API proxy. Anything under /api/* runs as a function. The redirect
# runs first; if no function matches, the SPA fallback applies.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/proxy"
  status = 200
  force = true
