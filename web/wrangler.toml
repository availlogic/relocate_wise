# Cloudflare Pages configuration for the RelocateWise SPA
# (Architecture v1.4.0 §3 / PRD v3.3.0 S9 / FR-15 / AC-14).
#
# Phase D (v1.0.0 GA) split the SPA into 4 sibling npm workspaces;
# the build command runs from the container workspace, which bundles
# the container shell + the lazy-loaded MFE chunks.
#
# `wrangler pages deploy ./container/dist` from the `web/` directory
# is the production deploy command. We commit a `wrangler.toml` so
# the project name + build output are pinned in source.
#
# The Cloudflare Pages routing for `/api/*` is handled in the
# Cloudflare dashboard (Functions → Routes) and forwards to the
# matching-service via the API gateway, exposed through Cloudflare
# Tunnel. See `artifacts/Deployment_Report.md` for the full runbook.
name = "relocatewise"
compatibility_date = "2026-06-01"
pages_build_output_dir = "./container/dist"

# Build settings:
#   build command: npm -w @relocatewise/web-container run build
#   publish dir:   ./container/dist
# The CEO sets `NODE_VERSION=20` in the Cloudflare Pages dashboard.