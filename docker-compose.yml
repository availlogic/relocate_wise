# Docker Compose for local development of the RelocateWise backend.
#
# One command: `docker compose up` brings up Postgres + PostGIS, the
# Node API, and a Caddy reverse proxy. The first boot applies both
# migrations and seeds the 40-city dataset automatically.
#
# Production deploys use the Cloudflare Pages + Tunnel topology
# described in Architecture v1.3.0 §3 and `artifacts/Deployment_Report.md`:
#   - The SPA is built and deployed to Cloudflare Pages.
#   - The backend is exposed via the `cloudflared` daemon defined in
#     `docker-compose.cloudflared.yml` (overlay).
#   - The `caddy` container listens only on the internal Docker
#     network (no host port mappings). All public traffic enters via
#     the outbound tunnel, so no inbound ports need to be opened.
#
# For local development with no Docker, the API falls back to the
# in-memory seed (`npm -w @relocatewise/api run dev`). See the
# README "Quick start" section.
#
# Architecture references: §2 (topology), §4.4 (DB), §10.1 (local dev),
# §10.3 (production deploy), §11 (secrets & CORS).

services:
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: relocatewise-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-relocatewise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-relocatewise}
      POSTGRES_DB: ${POSTGRES_DB:-relocatewise}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-relocatewise} -d ${POSTGRES_DB:-relocatewise}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - relocatewise

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: relocatewise-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-relocatewise}:${POSTGRES_PASSWORD:-relocatewise}@db:5432/${POSTGRES_DB:-relocatewise}
      PORT: 3000
      HOST: 0.0.0.0
      # Allowed CORS origin. In production this is the Cloudflare Pages
      # domain (e.g. https://relocatewise.pages.dev or a custom domain).
      # In dev it can be the Vite dev server.
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      GIT_SHA: ${GIT_SHA:-dev}
    networks:
      - relocatewise

  caddy:
    image: caddy:2-alpine
    container_name: relocatewise-caddy
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    # No host port mappings in production — cloudflared talks to
    # Caddy over the internal Docker network. Local dev can expose
    # ports via a docker-compose.override.yml.
    networks:
      - relocatewise

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  relocatewise:
    name: relocatewise_relocatewise